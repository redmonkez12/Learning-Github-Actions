name: my-first-workflow
on: push

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Running single command in Job1
        run: echo "Hi this is my first Github workflow"
      - name: Checking OS Release for Github Hosted Runner
        run: cat /etc/os-release
      - name: Calling Sleep
        run: sleep 20
  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
      - name: Checking the Hostname of Runner
        run: hostname
      - name: Running multiple commands
        run: |
          echo "Hi from Tomas"
          echo "Current time is `date`"