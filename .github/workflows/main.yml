name: my-first-workflow
on: push

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: Step-2 - Checkout
        uses: actions/checkout@v6.0.2
      - name: Step-3
        run: |
          echo `pwd >> myartifact.txt 
          ls -ltr
          hostname
      - name: Upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: single_file
          path: ./myartifact.txt